<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>글림 데이터 구조 페이지</title>
<style>
  body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f4f6fb;margin:0;padding:20px;color:#233}
  .card{background:#fff;border-radius:16px;padding:20px;max-width:560px;margin:0 auto 16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:#678;font-size:13px;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  td{padding:7px 4px;border-bottom:1px solid #eef1f6}
  td:last-child{text-align:right;font-weight:700}
  .ok{color:#1a7f4e}.warn{color:#c2571a}.bad{color:#c22}
  button{display:block;width:100%;padding:16px;margin-top:12px;border:0;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer}
  #btnSend{background:#2f6df6;color:#fff}
  #btnDl{background:#e8edf7;color:#234}
  #log{font-size:13px;line-height:1.6;color:#345;white-space:pre-wrap;max-height:220px;overflow:auto;background:#f7f9fd;border-radius:10px;padding:10px;margin-top:12px}
  .bar{height:10px;background:#e8edf7;border-radius:6px;overflow:hidden;margin-top:12px;display:none}
  .bar i{display:block;height:100%;width:0;background:#2f6df6;transition:width .2s}
</style>
</head>
<body>
<div class="card">
  <h1>🛟 글림 데이터 구조 페이지</h1>
  <div class="sub">이 태블릿에 남아있는 미전송 데이터를 확인하고 서버로 보내거나 파일로 저장합니다.<br>※ 게임과 같은 주소에서 열어야 데이터가 보입니다.</div>
  <table id="status"></table>
  <button id="btnSend">📡 Supabase로 재전송</button>
  <div class="bar"><i id="prog"></i></div>
  <button id="btnDl">💾 전체 데이터 파일로 저장 (전송 안 될 때)</button>
  <div id="log">준비됨.</div>
</div>
<script>
var CFG={url:'https://citntimephlbdmntegia.supabase.co',
         anonKey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpdG50aW1lcGhsYmRtbnRlZ2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NTU4MTMsImV4cCI6MjEwMDAzMTgxM30.zN5rpEuQPliwyqxV9I7pBp1hsd1yPc_DO6qTJLQtrlg'};
var QK='glim_supabase_queue_v1';
var KEYS=[QK,'glim_m2_L0_v1','glim_m2_prof_v1','glim_n_L0_v1','glim_n_prof_v1','glim_sid','glim_device_id_v1','glim_app_prog_v172'];
function getJ(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return localStorage.getItem(k);}}
function log(s){var el=document.getElementById('log');el.textContent+='\n'+s;el.scrollTop=el.scrollHeight;}
function esc(s){return String(s==null?'':s);}

function refresh(){
  var q=getJ(QK)||[], l0=getJ('glim_m2_L0_v1')||[], nl0=getJ('glim_n_L0_v1')||[];
  var sid=localStorage.getItem('glim_sid'), dev=localStorage.getItem('glim_device_id_v1');
  var qmin='', qmax='';
  if(q.length){var ts=q.map(function(x){return x.at||0}).filter(Boolean);
    if(ts.length){qmin=new Date(Math.min.apply(null,ts)).toLocaleString('ko-KR');qmax=new Date(Math.max.apply(null,ts)).toLocaleString('ko-KR');}}
  var rows=[
    ['이 태블릿 ID', esc(dev||'없음')],
    ['마지막 학생 번호', esc(sid||'없음')],
    ['<b>미전송 큐</b>', q.length? '<span class="'+(q.length?'warn':'ok')+'">'+q.length+'건 대기 중</span>':'<span class="ok">0건 (모두 전송됨)</span>'],
    ['큐 기록 시각 범위', q.length? qmin+'<br>~ '+qmax : '–'],
    ['단어나라 원장(마지막 학생)', l0.length+'행'],
    ['음절·음소 원장(마지막 학생)', nl0.length+'행']
  ];
  document.getElementById('status').innerHTML=rows.map(function(r){return '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';}).join('');
  return q;
}

document.getElementById('btnSend').onclick=function(){
  var q=getJ(QK)||[];
  if(!q.length){log('보낼 데이터가 없습니다. (큐 0건)');return;}
  if(!navigator.onLine){log('⚠️ 인터넷 연결이 없습니다. 와이파이/핫스팟 연결 후 다시 누르세요.');return;}
  var btn=this;btn.disabled=true;btn.textContent='전송 중...';
  document.querySelector('.bar').style.display='block';
  var dev=localStorage.getItem('glim_device_id_v1')||'dev_unknown';
  var total=q.length, done=0, fail=0;
  log('전송 시작: '+total+'건');
  function step(){
    var now=getJ(QK)||[];
    if(!now.length){finish();return;}
    var item=now[0];
    var body=Object.assign({event_id:item.id,device_id:dev},item.row);
    var table=String(item.table||'').split('?')[0]; /* on_conflict 등 파라미터 제거 — 순수 삽입으로 전송 */
    fetch(CFG.url+'/rest/v1/'+table,{method:'POST',
      headers:{apikey:CFG.anonKey,Authorization:'Bearer '+CFG.anonKey,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify(body)})
    .then(function(r){
      if(r.ok||r.status===409){ /* 409 = 이미 저장됨 → 성공 취급 */
        var cur=getJ(QK)||[];var i=cur.findIndex(function(x){return x.id===item.id;});
        if(i>=0){cur.splice(i,1);localStorage.setItem(QK,JSON.stringify(cur));}
        done++;
        document.getElementById('prog').style.width=Math.round(done/total*100)+'%';
        if(done%20===0)log(done+' / '+total+' 전송됨');
        setTimeout(step,30);
      }else{
        return r.text().then(function(t){throw new Error(r.status+': '+t.slice(0,120));});
      }
    })
    .catch(function(e){
      fail++;
      log('❌ 전송 실패: '+e.message);
      log('이 네트워크에서 서버 접근이 막혀 있을 수 있습니다. 폰 핫스팟으로 바꿔서 다시 시도하거나, 아래 "파일로 저장"을 사용하세요.');
      finish();
    });
  }
  function finish(){
    btn.disabled=false;btn.textContent='📡 Supabase로 재전송';
    log('완료 — 성공 '+done+'건'+(fail?', 중단됨':'')+'. 남은 큐 '+((getJ(QK)||[]).length)+'건');
    refresh();
  }
  step();
};

document.getElementById('btnDl').onclick=function(){
  var dump={_exported_at:new Date().toISOString(),_origin:location.href};
  KEYS.forEach(function(k){dump[k]=getJ(k);});
  var blob=new Blob([JSON.stringify(dump)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var dev=(localStorage.getItem('glim_device_id_v1')||'unknown').slice(0,16);
  a.download='glim_backup_'+dev+'.json';
  document.body.appendChild(a);a.click();a.remove();
  log('💾 백업 파일 저장됨: '+a.download+' — 이 파일을 채팅에 올려주시면 서버에 넣어드릴 수 있어요.');
};

refresh();
</script>
</body>
</html>
